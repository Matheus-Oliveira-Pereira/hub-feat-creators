spring:
  application:
    name: hub-feat-creators-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hub_feat_creators}
    username: ${DATABASE_USERNAME:hub_app}
    password: ${DATABASE_PASSWORD:changeme}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        enable_lazy_load_no_trans: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:test@example.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-not-for-prod-replace-with-256bit-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  secrets:
    email-key: ${EMAIL_KEY:dev-only-not-for-prod-32-byte-aes-key}
    whatsapp-key: ${WHATSAPP_KEY:dev-only-not-for-prod-whatsapp-32b!}
  web:
    base-url: ${WEB_BASE_URL:http://localhost:3000}
  features:
    compliance-strict: ${FEATURE_COMPLIANCE_STRICT:true}
    signup-enabled: ${FEATURE_SIGNUP_ENABLED:true}
    whatsapp-enabled: ${FEATURE_WHATSAPP_ENABLED:false}
  webpush:
    public-key: ${WEBPUSH_PUBLIC_KEY:}
    private-key: ${WEBPUSH_PRIVATE_KEY:}
    subject: ${WEBPUSH_SUBJECT:mailto:admin@example.com}
