spring:
  application:
    name: hub-feat-creators-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hub_feat_creators}
    username: ${DATABASE_USERNAME:hub_app}
    password: ${DATABASE_PASSWORD:changeme}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-not-for-prod-replace-with-256bit-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
