name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Backend (Java + Spring Boot)
  # ===========================================================================
  backend-lint-test:
    name: Backend lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hub_app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Spotless check
        run: ./mvnw -B spotless:check

      - name: Checkstyle
        run: ./mvnw -B checkstyle:check

      - name: Tests (unit + integration)
        env:
          SPRING_PROFILES_ACTIVE: test
          DATABASE_URL: jdbc:postgresql://localhost:5432/hub_test
          DATABASE_USERNAME: hub_app
          DATABASE_PASSWORD: test
        run: ./mvnw -B verify

      - name: JaCoCo coverage check
        run: ./mvnw -B jacoco:check

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: apps/api/target/site/jacoco/

  backend-security-scan:
    name: Backend security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency-Check
        run: ./mvnw -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

  # ===========================================================================
  # Frontend (Next.js + TypeScript)
  # ===========================================================================
  frontend-lint-test:
    name: Frontend lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test --run --coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: apps/web/coverage/

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ===========================================================================
  # Cross-cutting checks
  # ===========================================================================
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  blueprint-structure:
    name: Blueprint structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          echo "Checking required files..."
          files=(
            "CLAUDE.md"
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            "CHANGELOG.md"
            ".env.example"
            ".gitignore"
            ".claude/settings.json"
            "docs/specs/README.md"
            "docs/product/vision.md"
            "docs/runbooks/deploy.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then exit 1; fi
          echo "All required files present"

      - name: Spec modules have README
        run: |
          missing=0
          for dir in docs/specs/*/; do
            if [ ! -f "${dir}README.md" ]; then
              echo "::error::Missing README.md in $dir"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then exit 1; fi

      - name: CLAUDE.md within token budget
        run: |
          lines=$(wc -l < CLAUDE.md)
          if [ "$lines" -gt 200 ]; then
            echo "::error::CLAUDE.md tem $lines linhas — limite é 200"
            exit 1
          fi
          echo "CLAUDE.md: $lines linhas (OK)"
