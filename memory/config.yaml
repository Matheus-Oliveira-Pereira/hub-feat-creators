# ===========================================================================
# Vector DB backend
# ===========================================================================
# Default: Chroma local (zero infra, per-developer).
# Para memória compartilhada entre devs, trocar para pgvector (ver bloco abaixo).
backend: chroma
persist_dir: memory/.chroma

# Alternativa pgvector — descomentar e ajustar quando time crescer.
# Requer PostgreSQL 16+ com extension pgvector habilitada.
#
# backend: pgvector
# pgvector:
#   host: localhost
#   port: 5432
#   database: hub_feat_creators_memory
#   user: memory_user
#   password_env: PGVECTOR_PASSWORD
#   table_name: embeddings
#   embedding_dimensions: 384

# ===========================================================================
# Embedding model
# ===========================================================================
# Default: local (free, sem API key).
embedding_model: all-MiniLM-L6-v2
embedding_dimensions: 384
# Alternativas cloud (descomentar e setar API key em .env):
# embedding_model: text-embedding-3-small
# embedding_provider: openai
# embedding_dimensions: 1536
# embedding_model: voyage-code-3
# embedding_provider: voyage
# embedding_dimensions: 1024

# ===========================================================================
# Sources to index
# ===========================================================================
sources:
  - path: docs/
    glob: "**/*.md"
    chunk_by: heading
    metadata_type: docs

  # Backend (Java)
  - path: apps/api/src/
    glob: "**/*.java"
    chunk_by: file
    metadata_type: code

  # Frontend (TypeScript / TSX)
  - path: apps/web/
    glob: "**/*.ts"
    chunk_by: file
    metadata_type: code

  - path: apps/web/
    glob: "**/*.tsx"
    chunk_by: file
    metadata_type: code

# Git history
index_git_log: true
git_log_limit: 200

# Search defaults
default_top_k: 5
min_similarity: 0.3

# Collection name
collection_name: hub_feat_creators_memory

# ===========================================================================
# Cross-project memory (global)
# ===========================================================================
# Camada compartilhada entre TODOS os projetos do dev.
# Indexa ADRs, post-mortems e learner reports — conhecimento que transcende projeto.
global_memory:
  enabled: true
  persist_dir: ~/.claude/memory/global
  collection_name: global_memory
  sources:
    - type: adr
    - type: post_mortem
    - type: learner_report
